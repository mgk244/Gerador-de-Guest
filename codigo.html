<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Guest</title>
    <style>
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #111; border: 2px solid #6a0dad; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px #6a0dad; width: 450px; text-align: center; }
        h2 { color: #a020f0; margin-bottom: 15px; text-transform: uppercase; font-size: 20px; }
        input, textarea { width: 95%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; font-size: 14px; }
        textarea { height: 150px; resize: none; font-family: monospace; font-size: 12px; }
        input:focus, textarea:focus { border-color: #a020f0; box-shadow: 0 0 5px #a020f0; }
        .btn-envio { background: #6a0dad; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-envio:hover { background: #a020f0; transform: scale(1.01); }
        #msg { font-size: 13px; margin-top: 15px; font-weight: bold; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container">
    <h2>CODIGO EM MASSA GUEST</h2>
    <input type="password" id="accessKey" placeholder="DIGITE A KEY🔑">
    <p style="font-size: 11px; color: #888;">Cole as linhas do arquivo abaixo📁:</p>
    <textarea id="multiData" placeholder="4706273526:ITHALO-nnebCM..."></textarea>
    <button class="btn-envio" id="btnProcessar">PROCESSAR E SALVAR✅</button>
    <p id="msg"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBnHsXhrE7jcbNYplY3T9pF1WeeAl2XFaw",
        authDomain: "mtpk-b1b28.firebaseapp.com",
        databaseURL: "https://mtpk-b1b28-default-rtdb.firebaseio.com",
        projectId: "mtpk-b1b28",
        storageBucket: "mtpk-b1b28.firebasestorage.app",
        messagingSenderId: "257842382429",
        appId: "1:257842382429:web:5dc66ccdd9083d9a822fb4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('btnProcessar').addEventListener('click', async () => {
        const key = document.getElementById('accessKey').value;
        const rawData = document.getElementById('multiData').value.trim();
        const msg = document.getElementById('msg');

        if (key !== "777Jesus") {
            msg.style.color = "#ff4444";
            msg.innerText = "ACESSO NEGADO: CHAVE INCORRETA";
            return;
        }

        if (!rawData) {
            msg.style.color = "yellow";
            msg.innerText = "COLE OS DADOS PRIMEIRO!";
            return;
        }

        const linhas = rawData.split('\n');
        let contSucesso = 0;
        let contErro = 0;

        msg.style.color = "#aaa";
        msg.innerText = "Processando...";

        for (let linha of linhas) {
            // Separa pelo caractere ":"
            const partes = linha.split(':');
            
            if (partes.length >= 2) {
                const uid = partes[0].trim();
                const pass = partes[1].trim();

                try {
                    await push(ref(db, 'contas_guest'), {
                        uid: uid,
                        password: pass,
                        timestamp: Date.now()
                    });
                    contSucesso++;
                } catch (e) {
                    contErro++;
                }
            } else {
                contErro++;
            }
        }

        msg.style.color = "#00ff00";
        msg.innerText = `CONCLUÍDO!\n✅ ${contSucesso} contas salvas\n❌ ${contErro} linhas inválidas`;
        document.getElementById('multiData').value = "";
    });
</script>
</body>
</html>
